<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styling.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <canvas id="confetti-canvas"></canvas>

    <div class="container">
      <h1 class="title">Rock · Paper · Scissors</h1>

      <div class="mode-selector">
        <span class="mode-label">Match Mode:</span>
        <button class="mode-btn active" id="mode-3" onclick="setMode(3)">
          Best of 3
        </button>
        <button class="mode-btn" id="mode-5" onclick="setMode(5)">
          Best of 5
        </button>
      </div>

      <div class="match-progress">
        <div class="progress-side" id="player-dots"></div>
        <div class="progress-label">MATCH</div>
        <div class="progress-side" id="cpu-dots"></div>
      </div>

      <div class="scoreboard">
        <div class="score-box">
          <span class="score-label">You</span>
          <span class="score-number" id="wins">0</span>
        </div>
        <div class="score-box middle">
          <span class="score-label">Ties</span>
          <span class="score-number" id="ties">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">CPU</span>
          <span class="score-number" id="losses">0</span>
        </div>
      </div>

      <div class="streak-bar">
        <span class="streak-item"
          >🔥 Streak: <strong id="streak">0</strong></span
        >
        <span class="streak-divider">|</span>
        <span class="streak-item"
          >🏆 Best: <strong id="best-streak">0</strong></span
        >
      </div>

      <div class="choices" id="choices">
        <button class="choice-btn" onclick="play('R')">
          <span class="choice-emoji">🪨</span>
          <span class="choice-name">Rock</span>
        </button>
        <button class="choice-btn" onclick="play('P')">
          <span class="choice-emoji">📄</span>
          <span class="choice-name">Paper</span>
        </button>
        <button class="choice-btn" onclick="play('S')">
          <span class="choice-emoji">✂️</span>
          <span class="choice-name">Scissors</span>
        </button>
      </div>

      <div class="thinking" id="thinking" style="display: none">
        <span>CPU is thinking</span>
        <span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
      <div class="result-area" id="result-area" style="display: none">
        <div class="versus">
          <div class="player-side">
            <div class="big-emoji" id="user-emoji"></div>
            <div class="side-label">You</div>
            <div class="side-choice" id="user-choice"></div>
          </div>
          <div class="vs-text">VS</div>
          <div class="player-side">
            <div class="big-emoji" id="cpu-emoji"></div>
            <div class="side-label">CPU</div>
            <div class="side-choice" id="cpu-choice"></div>
          </div>
        </div>
        <div class="result-message" id="result-message"></div>
        <div class="taunt" id="taunt"></div>
      </div>

      <div class="match-banner" id="match-banner" style="display: none">
        <div class="banner-text" id="banner-text"></div>
        <button class="reset-btn primary" onclick="resetGame()">
          Play Again
        </button>
      </div>

      <div class="history-section">
        <div class="history-title">Last 5 Rounds</div>
        <div class="history-list" id="history-list">
          <span class="history-empty">No rounds yet...</span>
        </div>
      </div>

      <button class="reset-btn" onclick="resetGame()">Reset Match</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
